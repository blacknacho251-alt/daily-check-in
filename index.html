<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Clock-In (API Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .btn-glow-green:hover:not(:disabled) {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
            transform: translateY(-2px);
        }
        .btn-glow-slate:hover:not(:disabled) {
            box-shadow: 0 0 25px rgba(71, 85, 105, 0.5);
            transform: translateY(-2px);
        }
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #10b981;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8 h-full">
        <!-- Sidebar -->
        <aside class="w-full lg:w-72 flex flex-col gap-6">
            <div class="glass p-6 flex items-center gap-4 group">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-clock-rotate-left text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="font-black text-2xl tracking-tight">ClockIn.io</h1>
                    <p class="text-[10px] text-indigo-400 font-bold tracking-widest uppercase">API Pro Mode</p>
                </div>
            </div>
            
            <nav class="flex flex-col gap-3">
                <a href="#" class="glass p-5 flex items-center gap-4 bg-white/10 border-white/20 shadow-xl shadow-black/20">
                    <i class="fas fa-layer-group w-6 text-indigo-400"></i>
                    <span class="font-semibold">Dashboard</span>
                </a>
                <button onclick="openSettings()" class="glass p-5 flex items-center gap-4 hover:bg-white/5 hover:border-white/30 transition-all text-left group">
                    <i class="fas fa-cog w-6 text-white/40 group-hover:text-indigo-400"></i>
                    <span class="text-white/70">Settings (Token)</span>
                </button>
                <a href="https://github.com/blacknacho251-alt/daily-check-in/actions" target="_blank" class="glass p-5 flex items-center gap-4 hover:bg-white/5 hover:border-white/30 transition-all group">
                    <i class="fas fa-bolt w-6 text-white/40 group-hover:text-amber-400"></i>
                    <span class="text-white/70">Actions Log</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col gap-8">
            <!-- Hero Section -->
            <section class="glass p-12 flex flex-col items-center justify-center text-center relative overflow-hidden min-h-[400px]">
                <div class="mb-2 px-4 py-1 glass border-indigo-500/30 text-[10px] font-bold tracking-[0.3em] uppercase text-indigo-400">
                    Current Time (Asia/Shanghai)
                </div>
                <div id="current-time" class="text-8xl md:text-9xl font-black mb-4 tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-white/60">
                    00:00:00
                </div>
                <div id="current-date" class="text-white/50 font-medium mb-16 text-lg"></div>
                
                <div class="flex flex-col sm:flex-row gap-8 w-full max-w-2xl">
                    <button id="btn-in" onclick="triggerAction('Clock In')" class="flex-1 bg-gradient-to-br from-emerald-500 to-emerald-600 text-white py-6 rounded-3xl font-black text-xl transition-all btn-glow-green flex items-center justify-center gap-4 shadow-2xl shadow-emerald-500/20 active:scale-95 disabled:opacity-50">
                        <span id="label-in">Clock In</span>
                    </button>
                    <button id="btn-out" onclick="triggerAction('Clock Out')" class="flex-1 bg-gradient-to-br from-slate-700 to-slate-800 text-white py-6 rounded-3xl font-black text-xl transition-all btn-glow-slate flex items-center justify-center gap-4 shadow-2xl shadow-black/40 active:scale-95 disabled:opacity-50">
                        <span id="label-out">Clock Out</span>
                    </button>
                </div>
            </section>

            <!-- History Section -->
            <div class="glass p-8 flex-1">
                <h3 class="font-black text-xl mb-8 flex items-center justify-between">
                    <span class="flex items-center gap-3">
                        <span class="w-2 h-8 bg-indigo-500 rounded-full"></span>
                        Live Activity
                    </span>
                    <button onclick="loadData()" class="text-xs text-indigo-400 hover:underline">Refresh</button>
                </h3>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <tbody id="history-table" class="space-y-4">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-50 flex items-center justify-center p-6">
        <div class="glass max-w-md w-full p-8">
            <h2 class="text-2xl font-black mb-6 flex items-center gap-3">
                <i class="fas fa-key text-amber-400"></i> Setup Token
            </h2>
            <div class="space-y-6 text-sm">
                <div>
                    <label class="block text-white/40 font-bold uppercase tracking-widest text-[10px] mb-2">GitHub Token</label>
                    <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-indigo-500 outline-none transition-all">
                    <p class="mt-2 text-[10px] text-white/30">Tokens are saved locally and never uploaded. Scope: <b>repo</b>.</p>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-white/40 font-bold uppercase tracking-widest text-[10px] mb-2">Owner</label>
                        <input type="text" id="gh-owner" value="blacknacho251-alt" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none opacity-50" readonly>
                    </div>
                    <div class="flex-1">
                        <label class="block text-white/40 font-bold uppercase tracking-widest text-[10px] mb-2">Repo</label>
                        <input type="text" id="gh-repo" value="daily-check-in" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none opacity-50" readonly>
                    </div>
                </div>
            </div>
            <div class="mt-10">
                <button onclick="saveSettings()" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-white/90 active:scale-95 transition-all">Save & Close</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const OWNER = \"blacknacho251-alt\";
        const REPO = \"daily-check-in\";
        const WORKFLOW_ID = \"clock.yml\";

        function updateClock() {
            const now = new Date();
            const clock = document.getElementById('current-time');
            if(clock) clock.textContent = now.toLocaleTimeString('en-US', { hour12: false });
            const dateDisplay = document.getElementById('current-date');
            if(dateDisplay) {
                const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
                dateDisplay.textContent = now.toLocaleDateString('en-US', options);
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function openSettings() {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('settings-modal').classList.remove('hidden');
        }
        function saveSettings() {
            const token = document.getElementById('gh-token').value.trim();
            if (token) localStorage.setItem('gh_token', token);
            document.getElementById('settings-modal').classList.add('hidden');
            showToast(\"Settings saved successfully!\", \"#6366f1\");
        }

        async function triggerAction(actionType) {
            const token = localStorage.getItem('gh_token');
            if (!token) {
                alert(\"Please configure your GitHub Token first!\");
                openSettings();
                return;
            }
            const btn = actionType === 'Clock In' ? document.getElementById('btn-in') : document.getElementById('btn-out');
            const label = actionType === 'Clock In' ? document.getElementById('label-in') : document.getElementById('label-out');
            const originalText = label.innerHTML;
            btn.disabled = true;
            label.innerHTML = '<div class=\"loading-spinner\"></div> Processing...';
            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ ref: 'main', inputs: { action: actionType } })
                });
                if (response.ok) {
                    showToast(`✅ ${actionType} successful!`);
                    setTimeout(loadData, 5000);
                } else {
                    const err = await response.json();
                    throw new Error(err.message || 'API Fail');
                }
            } catch (err) {
                alert(`❌ Action failed: ${err.message}`);
            } finally {
                btn.disabled = false;
                label.innerHTML = originalText;
            }
        }

        function showToast(msg, color = \"#10b981\") {
            const t = document.getElementById(\"toast\");
            t.textContent = msg;
            t.style.backgroundColor = color;
            t.className = \"show\";
            setTimeout(() => { t.className = \"\"; }, 3000);
        }

        async function loadData() {
            try {
                const response = await fetch(`data/records.csv?t=${Date.now()}`);
                if (!response.ok) return;
                const text = await response.text();
                const lines = text.trim().split('\\n').slice(1).reverse();
                const table = document.getElementById('history-table');
                table.innerHTML = '';
                lines.slice(0, 10).forEach(line => {
                    const [ts, act] = line.split(',');
                    const row = document.createElement('tr');
                    row.className = \"border-b border-white/5 last:border-0 hover:bg-white/[0.02] transition-colors text-white/80\";
                    const isIN = act.trim() === 'Clock In';
                    row.innerHTML = `<td class=\"py-5 font-bold\">\${ts.split(' ')[1]}</td><td class=\"py-5 text-xs opacity-40\">\${ts.split(' ')[0]}</td><td class=\"py-5 text-right\"><span class=\"px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest \${isIN ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-500/10 text-slate-400'}\">\${act}</span></td>`;
                    table.appendChild(row);
                });
            } catch (e) {}
        }
        loadData();
    </script>
</body>
</html>
