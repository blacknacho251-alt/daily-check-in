name: Work Clock In/Out

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'Clock In'
        type: choice
        options:
        - 'Clock In'
        - 'Clock Out'

jobs:
  update-record:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Timezone
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: Update Records
        run: |
          mkdir -p data
          if [ ! -f data/records.csv ]; then
            echo "Timestamp,Action" > data/records.csv
          fi
          TIME=$(date "+%Y-%m-%d %H:%M:%S")
          echo "$TIME,${{ github.event.inputs.action }}" >> data/records.csv
          
          # Update README
          sed -i '/| Timestamp | Action |/q' README.md
          echo "| --- | --- |" >> README.md
          
          tail -n 10 data/records.csv | grep -v "Timestamp,Action" | tac | while read line; do
            T=$(echo $line | cut -d',' -f1)
            A=$(echo $line | cut -d',' -f2)
            echo "| $T | $A |" >> README.md
          done
          
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update record: ${{ github.event.inputs.action }}"
          git push
