name: Work Clock In/Out\n\non:\n  workflow_dispatch:\n    inputs:\n      action:\n        description: 'Action'\n        required: true\n        default: 'Clock In'\n        type: choice\n        options:\n        - 'Clock In'\n        - 'Clock Out'\n\njobs:\n  update-record:\n    runs-on: ubuntu-latest\n    permissions:\n      contents: write\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v4\n\n      - name: Set up Timezone\n        run: sudo timedatectl set-timezone Asia/Shanghai\n\n      - name: Update Records\n        run: |\n          mkdir -p data\n          if [ ! -f data/records.csv ]; then\n            echo \"Timestamp,Action\" > data/records.csv\n          fi\n          TIME=$(date \"+%Y-%m-%d %H:%M:%S\")\n          echo \"$TIME,${{ github.event.inputs.action }}\" >> data/records.csv\n          \n          # Update README\n          sed -i '/| Timestamp | Action |/q' README.md\n          echo \"| --- | --- |\" >> README.md\n          \n          tail -n 10 data/records.csv | grep -v \"Timestamp,Action\" | tac | while read line; do\n            T=$(echo $line | cut -d',' -f1)\n            A=$(echo $line | cut -d',' -f2)\n            echo \"| $T | $A |\" >> README.md\n          done\n          \n      - name: Commit & Push\n        run: |\n          git config --global user.name \"github-actions[bot]\"\n          git config --global user.email \"github-actions[bot]@users.noreply.github.com\"\n          git add .\n          git commit -m \"Update record: ${{ github.event.inputs.action }}\"\n          git push\n
